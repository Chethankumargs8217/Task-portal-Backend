spring.application.name=taskportal

# MySQL ? values come from environment variables (set in your OS or deployment)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/taskportal}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Server
server.port=8080

# JWT ? set JWT_SECRET as an environment variable, never hardcode
jwt.secret=${JWT_SECRET:MyVerySecretJwtKeyForTaskPortalApplication123456}
jwt.expiration=86400000

# Gemini AI ? set GEMINI_API_KEY as an environment variable
gemini.api.key=${GEMINI_API_KEY:AQ.Ab8RN6LYkF9y8FKe6NkaL98U8TaSYuS_9GfCTjP8gAxIqPMzAw}
